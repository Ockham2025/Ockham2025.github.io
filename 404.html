    letter-spacing: 2px;

    transition: all 0.3s ease;

  .home-btn:hover {
    background: #f2f2f2;
    color: #0d0d0d;

  footer {

  .footer-links {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 12px;
  }
  .footer-links a { color: #f2f2f2; text-decoration: none; font-size: 14px; }
  .footer-links a:hover { color: #e63946; }
  .footer-bottom {
    text-align: center;
    color: #666;
    font-size: 14px;
    padding: 20px 0;
    border-top: 1px solid #2a2a2a;
  }

  @media (max-width: 600px) {
    .error-code { font-size: 70px; }
    .error-message { font-size: 15px; }
