<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    background: #000000;
    color: #f2f2f2;

    min-height: 100vh;
  }
header {
  padding: 40px 20px;
  text-align: center;
  position: relative;
}
header a { display: inline-block; }
  header::after {
    content: '';
    position: absolute;
    bottom: -1px;
    left: 0;
    right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, #555, transparent);
  }
  header img {
    max-width: 400px;
    width: 90%;
    height: auto;
  }
  nav {
    display: flex;
    justify-content: center;
    gap: 30px;
    margin-top: 20px;
    flex-wrap: wrap;
  }
  nav a {
    color: #f2f2f2;
    text-decoration: none;
    font-family: 'Oswald', sans-serif;
    font-size: 16px;
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  nav a:hover { color: #e63946; }
  main {
    flex: 1;
    max-width: 1100px;
    margin: 0 auto;
    padding: 60px 20px;
    text-align: center;
    width: 100%;
  }

  /* Hero-зображення */
  .hero {
    width: 100%;
    max-width: 1000px;
    margin: 0 auto;
    border-radius: 8px;
    overflow: hidden;
    box-shadow: 0 20px 60px rgba(0, 0, 0, 0.6), 0 0 0 1px rgba(255, 255, 255, 0.06);
  }
  .hero img {
    width: 100%;
    height: auto;
    display: block;
  }

  /* Розділювач між секціями */
  .divider {
    max-width: 300px;
    height: 1px;
    margin: 40px auto 0;
    background: linear-gradient(90deg, transparent, #444, transparent);
  }

  /* Секція альбому */
  .album {
    text-align: center;
    margin-top: 80px;
  }
  .album-title {
    font-family: 'Oswald', sans-serif;
    font-size: 32px;
    font-weight: 700;
    color: #f2f2f2;
    text-transform: uppercase;
    letter-spacing: 2px;
    line-height: 1.3;
  }
  .album-subtitle {
    font-family: 'Oswald', sans-serif;
    font-size: 14px;
    letter-spacing: 2px;
    color: #f2f2f2;
    margin-top: 20px;
    text-transform: uppercase;
  }
  .album-date {
    font-family: 'Manrope', sans-serif;
    font-size: 14px;
    color: #f2f2f2;
    margin-top: 8px;
  }
.album-cover {
  display: block;
  max-width: 400px;
  width: 100%;
  margin: 40px auto 0;
  border-radius: 8px;
  overflow: hidden;
  box-shadow: 0 20px 60px rgba(0, 0, 0, 0.6), 0 0 0 1px rgba(255, 255, 255, 0.06);
}
  .album-cover img {
    width: 100%;
    height: auto;
    display: block;
  }
  .album-streams {
    display: flex;
    justify-content: center;
    gap: 24px;
    margin-top: 30px;
  }
  .album-streams a {
    color: #f2f2f2;
    font-size: 26px;
    text-decoration: none;
    transition: all 0.3s ease;
  }
  .album-streams a:hover {
    color: #e63946;
    transform: translateY(-2px);
  }

  /* Заголовок секції */
  .section-label {
    font-family: 'Oswald', sans-serif;
    font-size: 22px;
    font-weight: 700;
    color: #f2f2f2;
    text-transform: uppercase;
    letter-spacing: 2px;
    margin-top: 30px;
    margin-bottom: 30px;
  }

  /* Відео */
  .video-wrap {
    max-width: 800px;
    margin: 0 auto;
    border-radius: 8px;
    overflow: hidden;
    box-shadow: 0 20px 60px rgba(0, 0, 0, 0.6), 0 0 0 1px rgba(255, 255, 255, 0.06);
    position: relative;
    width: 100%;
    padding-bottom: 45%;
    height: 0;
  }
  .video-wrap iframe {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    border: 0;
  }
  footer {
    padding: 40px 20px 0;
    position: relative;
  }
  footer::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, #555, transparent);

  .footer-top {

    display: flex;

    flex-wrap: wrap;

    padding-bottom: 30px;

    font-size: 20px;
    text-decoration: none;

  .footer-links {

    text-decoration: none;

  .footer-bottom {
    text-align: center;
    color: #666;
    font-size: 14px;
    padding: 20px 0;
    border-top: 1px solid #2a2a2a;
  }

  @media (max-width: 600px) {
    header { padding: 30px 15px; }
    nav { gap: 20px; }
    nav a { font-size: 14px; }
    main { padding: 40px 15px; }
    .hero { border-radius: 4px; }
    .album-title { font-size: 24px; }
    .section-label { font-size: 18px; }
    .footer-top {
      flex-direction: column;
      align-items: center;
      text-align: center;
      gap: 25px;
    }
    .footer-links {
      align-items: center;
    }
  }
</style>
