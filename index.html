<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FRANCO | Офіційний сайт</title>
<meta name="description" content="Офіційний сайт FRANCO. Альбоми, відео, архів та новини українського альтернативного рок-гурту.">
<meta property="og:title" content="FRANCO — Офіційний сайт">
<meta property="og:description" content="Альбоми, відео, архів та новини FRANCO.">
<meta property="og:image" content="https://franco.com.ua/images/hrim-i-krov.png">
<meta property="og:url" content="https://franco.com.ua/">
<meta property="og:type" content="website">
<meta name="twitter:card" content="summary_large_image">
<link rel="icon" type="image/png" href="/images/franco-favicon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;700&family=Manrope:wght@400;500;700&display=swap&subset=cyrillic" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: smooth; }
  html, body { height: 100%; }
  body {
    background: #000000;
    color: #f2f2f2;
    font-family: 'Manrope', Arial, sans-serif;
    display: flex;
    flex-direction: column;
    min-height: 100vh;
    overflow-x: hidden;
  }
header {
  padding: 40px 20px;
  text-align: center;
  position: relative;
}
header a { display: inline-block; }
  header::after {
    content: '';
    position: absolute;
    bottom: -1px;
    left: 0;
    right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, #555, transparent);
  }
  header img {
    max-width: 400px;
    width: 90%;
    height: auto;
  }
  nav {
    display: flex;
    justify-content: center;
    gap: 30px;
    margin-top: 20px;
    flex-wrap: wrap;
  }
  nav a {
    color: #f2f2f2;
    text-decoration: none;
    font-family: 'Oswald', sans-serif;
    font-size: 16px;
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  nav a:hover { color: #e63946; }
  main {
    flex: 1;
    max-width: 1100px;
    margin: 0 auto;
    padding: 60px 20px;
    text-align: center;
    width: 100%;
  }

  /* Fade-in utility */
  .fade-in {
    opacity: 0;
    transform: translateY(30px);
    transition: opacity 0.9s ease, transform 0.9s ease;
  }
  .fade-in.is-visible {
    opacity: 1;
    transform: translateY(0);
  }
  .hero.fade-in {
    transform: scale(1.03);
  }
  .hero.fade-in.is-visible {
    transform: scale(1);
  }

  /* Hero-зображення */
  .hero {
    width: 100%;
    max-width: 1000px;
    margin: 0 auto;
    border-radius: 8px;
    overflow: hidden;
    box-shadow: 0 20px 60px rgba(0, 0, 0, 0.6), 0 0 0 1px rgba(255, 255, 255, 0.06);
    transition: opacity 1.1s ease, transform 1.1s ease;
  }
  .hero img {
    width: 100%;
    height: auto;
    display: block;
  }

  /* Розділювач між секціями */
  .divider {
    max-width: 300px;
    height: 1px;
    margin: 40px auto 0;
    background: linear-gradient(90deg, transparent, #444, transparent);
  }

  /* Секція альбому */
  .album {
    text-align: center;
    margin-top: 100px;
  }
  .album-eyebrow {
    font-family: 'Oswald', sans-serif;
    font-size: 14px;
    letter-spacing: 3px;
    color: #888;
    text-transform: uppercase;
    margin-bottom: 20px;
  }
  .album-title {
    font-family: 'Oswald', sans-serif;
    font-weight: 700;
    color: #f2f2f2;
    text-transform: uppercase;
    letter-spacing: 1px;
    line-height: 1.1;
    font-size: clamp(34px, 6vw, 80px);
  }
  .album-title .accent { color: #e63946; }
  .album-date {
    font-family: 'Manrope', sans-serif;
    font-size: 14px;
    color: #f2f2f2;
    margin-top: 16px;
    letter-spacing: 1px;
  }
.album-cover {
  display: block;
  max-width: 400px;
  width: 100%;
  margin: 50px auto 0;
  border-radius: 8px;
  overflow: hidden;
  box-shadow: 0 20px 60px rgba(0, 0, 0, 0.6), 0 0 0 1px rgba(255, 255, 255, 0.06);
}
  .album-cover img {
    width: 100%;
    height: auto;
    display: block;
  }
  .album-streams {
    display: flex;
    justify-content: center;
    gap: 24px;
    margin-top: 30px;
  }
  .album-streams a {
    color: #f2f2f2;
    font-size: 26px;
    text-decoration: none;
    transition: all 0.3s ease;
  }
  .album-streams a:hover {
    color: #e63946;
    transform: translateY(-2px);
  }

  /* Заголовок секції */
  .section-label {
    font-family: 'Oswald', sans-serif;
    font-size: 22px;
    font-weight: 700;
    color: #f2f2f2;
    text-transform: uppercase;
    letter-spacing: 2px;
    margin-top: 30px;
    margin-bottom: 30px;
  }

  /* Відео */
  .video-wrap {
    max-width: 800px;
    margin: 0 auto;
    border-radius: 8px;
    overflow: hidden;
    box-shadow: 0 20px 60px rgba(0, 0, 0, 0.6), 0 0 0 1px rgba(255, 255, 255, 0.06);
    position: relative;
    width: 100%;
    padding-bottom: 45%;
    height: 0;
  }
  .video-wrap iframe {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    border: 0;
  }

  /* Форма підписки */
  .newsletter {
    max-width: 1100px;
    margin: 0 auto;
    text-align: center;
    padding-bottom: 40px;
  }
  .newsletter-label {
    font-family: 'Oswald', sans-serif;
    font-size: 14px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: #f2f2f2;
    margin-bottom: 20px;
  }
  .newsletter-form {
    display: flex;
    justify-content: center;
    gap: 10px;
    flex-wrap: wrap;
  }
  .newsletter-input {
    background: transparent;
    border: 1px solid #444;
    color: #f2f2f2;
    padding: 12px 18px;
    font-family: 'Manrope', sans-serif;
    font-size: 15px;
    min-width: 260px;
    border-radius: 4px;
  }
  .newsletter-input::placeholder { color: #777; }
  .newsletter-input:focus {
    outline: none;
    border-color: #e63946;
  }
  .newsletter-btn {
    padding: 12px 30px;
    border: 1px solid #f2f2f2;
    background: transparent;
    color: #f2f2f2;
    font-family: 'Oswald', sans-serif;
    font-size: 13px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    cursor: pointer;
    border-radius: 4px;
    transition: all 0.3s ease;
  }
  .newsletter-btn:hover {
    background: #f2f2f2;
    color: #0d0d0d;
  }

  footer {
    padding: 40px 20px 0;
    position: relative;
  }
  footer::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, #555, transparent);
  }
  .footer-top {
    max-width: 1100px;
    margin: 0 auto;
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    flex-wrap: wrap;
    gap: 20px;
    padding-bottom: 30px;
  }
  .footer-socials {
    display: flex;
    gap: 20px;
  }
  .footer-socials a {
    color: #f2f2f2;
    font-size: 20px;
    text-decoration: none;
  }
  .footer-socials a:hover { color: #e63946; }
  .footer-links {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 12px;
  }
  .footer-links a {
    color: #f2f2f2;
    text-decoration: none;
    font-size: 14px;
  }
  .footer-links a:hover { color: #e63946; }
  .footer-bottom {
    text-align: center;
    color: #666;
    font-size: 14px;
    padding: 20px 0;
    border-top: 1px solid #2a2a2a;
  }

  @media (max-width: 600px) {
    header { padding: 30px 15px; }
    nav { gap: 20px; }
    nav a { font-size: 14px; }
    main { padding: 40px 15px; }
    .hero { border-radius: 4px; }
    .album { margin-top: 70px; }
    .section-label { font-size: 18px; }
    .newsletter-form { flex-direction: column; align-items: center; }
    .newsletter-input { width: 100%; max-width: 320px; }
    .footer-top {
      flex-direction: column;
      align-items: center;
      text-align: center;
      gap: 25px;
    }
    .footer-links {
      align-items: center;
    }
  }
  @media (prefers-reduced-motion: reduce) {
    .fade-in, .hero {
      transition: none;
      opacity: 1;
      transform: none;
    }
  }
</style>
</head>

<!-- Cloudflare Web Analytics --><script type='module' src='https://static.cloudflareinsights.com/beacon.min.js' data-cf-beacon='{"token": "830a47a27072481b9885e0675f015796"}'></script><!-- End Cloudflare Web Analytics -->
<script>
  const observer = new IntersectionObserver((entries) => {
    entries.forEach((entry) => {
      if (entry.isIntersecting) {
        entry.target.classList.add('is-visible');
        observer.unobserve(entry.target);
      }
    });
  }, { threshold: 0.15 });

  document.querySelectorAll('.fade-in').forEach((el) => {
    observer.observe(el);
  });
</script>
