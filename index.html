<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FRANCO</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;700&family=Manrope:wght@400;500;700&display=swap&subset=cyrillic" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    height: 100%;
  }
  body {
    background: #0d0d0d;
    color: #f2f2f2;
    font-family: 'Manrope', Arial, sans-serif;
    display: flex;
    flex-direction: column;
    min-height: 100vh;
  }
  header {
    padding: 40px 20px;
    text-align: center;
    border-bottom: 1px solid #2a2a2a;
  }
  header img {
    max-width: 400px;
    width: 90%;
    height: auto;
  }
  nav {
    display: flex;
    justify-content: center;
    gap: 30px;
    margin-top: 20px;
    flex-wrap: wrap;
  }
  nav a {
    color: #f2f2f2;
    text-decoration: none;
    font-family: 'Oswald', sans-serif;
    font-size: 16px;
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  nav a:hover { color: #e63946; }
  main {
    flex: 1;
    max-width: 900px;
    margin: 60px auto;
    padding: 0 20px;
    text-align: center;
  }
  main p {
    font-size: 18px;
    line-height: 1.6;
    color: #b3b3b3;
  }
  footer {
    text-align: center;
    padding: 30px;
    color: #666;
    font-size: 14px;
    border-top: 1px solid #2a2a2a;
  }
</style>
</head>
<body>

<header>
  <img src="images/logo2018.png" alt="FRANCO">
  <nav>
    <a href="/music/">Музика</a>
    <a href="/videos/">Відео</a>
    <a href="/notes/">Нотатки</a>
    <a href="/about/">Про гурт</a>
  </nav>
</header>

<main>
  <p>!!!</p>
</main>

<footer>
  &copy; 2026 FRANCO
</footer>

</body>
</html>
