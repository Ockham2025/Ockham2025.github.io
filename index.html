<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FRANCO</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;700&family=Manrope:wght@400;500;700&display=swap&subset=cyrillic" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    height: 100%;
  }
  body {
    background: #000000;
    color: #f2f2f2;
    font-family: 'Manrope', Arial, sans-serif;
    display: flex;
    flex-direction: column;
    min-height: 100vh;
  }
  header {
    padding: 40px 20px;
    text-align: center;
    border-bottom: 1px solid #2a2a2a;
  }
  header img {
    max-width: 400px;
    width: 90%;
    height: auto;
  }
  nav {
    display: flex;
    justify-content: center;
    gap: 30px;
    margin-top: 20px;
    flex-wrap: wrap;
  }
  nav a {
    color: #f2f2f2;
    text-decoration: none;
    font-family: 'Oswald', sans-serif;
    font-size: 16px;
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  nav a:hover { color: #e63946; }
  main {
    flex: 1;
    max-width: 900px;
    margin: 60px auto;
    padding: 0 20px;
    text-align: center;
  }
  main p {
    font-size: 18px;
    line-height: 1.6;
    color: #b3b3b3;
  }
  footer {
    border-top: 1px solid #2a2a2a;
    padding: 40px 20px 0;
  }
  .footer-top {
    max-width: 1100px;
    margin: 0 auto;
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    flex-wrap: wrap;
    gap: 20px;
    padding-bottom: 30px;
  }
  .footer-socials {
    display: flex;
    gap: 20px;
  }
  .footer-socials a {
    color: #f2f2f2;
    font-size: 20px;
    text-decoration: none;
  }
  .footer-socials a:hover { color: #e63946; }
  .footer-links {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 12px;
  }
  .footer-links a {
    color: #f2f2f2;
    text-decoration: none;
    font-size: 14px;
  }
  .footer-links a:hover { color: #e63946; }
  .footer-bottom {
    text-align: center;
    color: #666;
    font-size: 14px;
    padding: 20px 0;
    border-top: 1px solid #2a2a2a;
  }

  @media (max-width: 600px) {
    header { padding: 30px 15px; }
    nav { gap: 20px; }
    nav a { font-size: 14px; }
    main { margin: 40px auto; }
    .footer-top {
      flex-direction: column;
      align-items: center;
      text-align: center;
      gap: 25px;
    }
    .footer-links {
      align-items: center;
    }
  }
</style>
</head>
<body>
<header>
  <img src="images/logo2018.png" alt="FRANCO">
  <nav>
    <a href="/music/">Музика</a>
    <a href="/videos/">Відео</a>
    <a href="/notes/">Нотатки</a>
    <a href="/about/">Про гурт</a>
  </nav>
</header>
<main>
  <p>!!!</p>
</main>
<footer>
  <div class="footer-top">
    <div class="footer-socials">
      <a href="https://www.instagram.com/francoband/" target="_blank" aria-label="Instagram"><i class="fa-brands fa-instagram"></i></a>
      <a href="https://www.facebook.com/francoband/" target="_blank" aria-label="Facebook"><i class="fa-brands fa-facebook"></i></a>
      <a href="https://open.spotify.com/artist/4dVvyUBS8H70Meuw9n4lhw" target="_blank" aria-label="Spotify"><i class="fa-brands fa-spotify"></i></a>
      <a href="https://www.youtube.com/channel/UCk6v9L8YVHV8B0qeUE-ND-g" target="_blank" aria-label="YouTube"><i class="fa-brands fa-youtube"></i></a>
      <a href="https://www.tiktok.com/@francoband" target="_blank" aria-label="TikTok"><i class="fa-brands fa-tiktok"></i></a>
      <a href="https://music.apple.com/ua/artist/franco/1098769283?l=uk" target="_blank" aria-label="Apple Music"><i class="fa-brands fa-apple"></i></a>
    </div>
    <div class="footer-links">
      <a href="/privacy-policy/">Політика конфіденційності</a>
      <a href="/reach-us/">Контакти</a>
    </div>
  </div>
  <div class="footer-bottom">
    &copy; 2026 FRANCO
  </div>
</footer>
</body>
</html>
