<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FRANCO</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0d0d0d;
    color: #f2f2f2;
    font-family: 'Manrope', Arial, sans-serif;
  }
  header {
    padding: 40px 20px;
    text-align: center;
    border-bottom: 1px solid #2a2a2a;
  }
  header h1 {
    font-family: 'Oswald', sans-serif;
    font-size: 48px;
    letter-spacing: 4px;
  }
  nav {
    display: flex;
    justify-content: center;
    gap: 30px;
    margin-top: 20px;
  }
  nav a {
    color: #f2f2f2;
    text-decoration: none;
    font-size: 16px;
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  nav a:hover { color: #e63946; }
  main {
    max-width: 900px;
    margin: 60px auto;
    padding: 0 20px;
    text-align: center;
  }
  main p {
    font-size: 18px;
    line-height: 1.6;
    color: #b3b3b3;
  }
  footer {
    text-align: center;
    padding: 30px;
    color: #666;
    font-size: 14px;
  }
</style>
</head>

<header>
  <img src="images/logo2018.png" alt="FRANCO" style="max-width: 400px; width: 90%; height: auto;">
  <nav>
    <a href="#">Музика</a>
