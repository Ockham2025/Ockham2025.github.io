<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: smooth; }
  html, body { height: 100%; }
  body {
    background: #000000;
    color: #f2f2f2;
    font-family: 'Manrope', Arial, sans-serif;
    display: flex;
    flex-direction: column;
    min-height: 100vh;
    overflow-x: hidden;
  }
  header {
    padding: 40px 20px;
    text-align: center;
    position: relative;
  }
  header a { display: inline-block; }
  header::after {
    content: '';
    position: absolute;
    bottom: -1px;
    left: 0;
    right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, #555, transparent);
  }
  header img {
    max-width: 400px;
    width: 90%;
    height: auto;
  }
  main {
    flex: 1;
    max-width: 480px;
    margin: 0 auto;
    padding: 60px 20px;
    text-align: center;
    width: 100%;
  }

  /* Fade-in utility */
  .fade-in {
    opacity: 0;
    transform: translateY(20px);
    transition: opacity 0.7s ease, transform 0.7s ease;
  }
  .fade-in.is-visible {
    opacity: 1;
    transform: translateY(0);
  }

  .page-title {
    font-family: 'Oswald', sans-serif;
    font-size: 28px;
    font-weight: 700;
    color: #f2f2f2;
    text-transform: uppercase;
    letter-spacing: 2px;
    margin-bottom: 8px;
  }
  .page-subtitle {
    font-size: 14px;
    color: #888;
    margin-bottom: 36px;
  }

  /* Соцмережі вгорі */
  .links-socials {
    display: flex;
    justify-content: center;
    gap: 26px;
    margin-bottom: 44px;
  }
  .links-socials a {
    color: #f2f2f2;
    font-size: 22px;
    text-decoration: none;
    transition: all 0.3s ease;
  }
  .links-socials a:hover {
    color: #e63946;
    transform: translateY(-2px);
  }

  /* Список кнопок-посилань */
  .link-list {
    display: flex;
    flex-direction: column;
    gap: 14px;
  }
  .link-btn {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 14px;
    padding: 18px 22px;
    background: #0d0d0d;
    border: 1px solid #2a2a2a;
    border-radius: 8px;
    text-decoration: none;
    color: #f2f2f2;
    text-align: left;
    cursor: pointer;
    transition: border-color 0.3s ease, transform 0.2s ease, background 0.3s ease;
    width: 100%;
    font-family: inherit;
  }
  .link-btn:hover {
    border-color: #e63946;
    background: #141414;
    transform: translateY(-2px);
  }
  .link-btn.featured {
    border-color: #e63946;
    background: linear-gradient(180deg, rgba(230,57,70,0.12), rgba(230,57,70,0.02));
  }
  .link-btn-text {
    display: flex;
    flex-direction: column;
    gap: 3px;
  }
  .link-btn-title {
    font-family: 'Oswald', sans-serif;
    font-size: 15px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .link-btn-sub {
    font-size: 13px;
    color: #888;
  }
  .link-btn-arrow {
    font-size: 14px;
    color: #666;
    flex-shrink: 0;
    transition: transform 0.3s ease, color 0.3s ease;
  }
  .link-btn:hover .link-btn-arrow {
    color: #e63946;
    transform: translateX(3px);
  }
  .link-btn[aria-expanded="true"] .link-btn-arrow {
    transform: rotate(90deg);
    color: #e63946;
  }

  .links-divider {
    height: 1px;
    background: linear-gradient(90deg, transparent, #333, transparent);
    margin: 30px 0;
  }

  /* Форма підписки, що розкривається */
  .subscribe-panel {
    max-height: 0;
    overflow: hidden;
    transition: max-height 0.4s ease, margin 0.4s ease;
    margin-top: 0;
  }
  .subscribe-panel.is-open {
    max-height: 200px;
    margin-top: 10px;
  }
  #mc_embed_signup {
    background: transparent;
    padding: 4px 4px 16px;
  }
  #mc_embed_signup form { padding: 0; }
  .subscribe-row {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
  }
  #mc_embed_signup input[type="email"] {
    flex: 1;
    min-width: 160px;
    background: transparent;
    border: 1px solid #444;
    border-radius: 4px;
    padding: 12px 18px;
    color: #f2f2f2;
    font-family: 'Manrope', sans-serif;
    font-size: 15px;
    outline: none;
    transition: border-color 0.3s ease;
  }
  #mc_embed_signup input[type="email"]::placeholder { color: #777; }
  #mc_embed_signup input[type="email"]:focus { border-color: #e63946; }
  #mc_embed_signup input[type="submit"] {
    padding: 12px 30px;
    border: 1px solid #f2f2f2;
    background: transparent;
    color: #f2f2f2;
    font-family: 'Oswald', sans-serif;
    font-size: 13px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    cursor: pointer;
    border-radius: 4px;
    transition: all 0.3s ease;
  }
  #mc_embed_signup input[type="submit"]:hover {
    background: #f2f2f2;
    color: #0d0d0d;
  }
  #mc_embed_signup .indicates-required,
  #mc_embed_signup label { display: none; }
  #mce-responses { margin-top: 10px; font-size: 13px; text-align: left; }
  #mce-error-response { color: #e63946; }
  #mce-success-response { color: #7fd989; }

  footer {
    padding: 40px 20px;
    position: relative;
    margin-top: 40px;
  }
  footer::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, #555, transparent);
  }
  .footer-bottom {
    text-align: center;
    color: #666;
    font-size: 14px;
  }

  @media (max-width: 600px) {
    header { padding: 30px 15px; }
    main { padding: 40px 15px; }
    .page-title { font-size: 22px; }
  }
  @media (prefers-reduced-motion: reduce) {
    .fade-in {
      transition: none;
      opacity: 1;
      transform: none;
    }
  }
</style>

<script>
  const observer = new IntersectionObserver((entries) => {
    entries.forEach((entry) => {
      if (entry.isIntersecting) {
        entry.target.classList.add('is-visible');
        observer.unobserve(entry.target);
      }
    });
  }, { threshold: 0.15 });

  document.querySelectorAll('.fade-in').forEach((el) => {
    observer.observe(el);
  });

  const subToggle = document.getElementById('subscribe-toggle');
  const subPanel = document.getElementById('subscribe-panel');
  subToggle.addEventListener('click', () => {
    const isOpen = subPanel.classList.toggle('is-open');
    subToggle.setAttribute('aria-expanded', isOpen ? 'true' : 'false');
  });
</script>
